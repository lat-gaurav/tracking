# ── pysot SiamRPN weights (Google Drive) ──────────────────────────────────────
pysot_weights:

  - dest:    siamese/pysot/experiments/siamrpn_alex_dwxcorr/model/model.pth
    gdrive:  "1t62x56Jl7baUzPTo0QrC4jJnwvPZm-2m"
    note:    "AlexNet-backbone SiamRPN (lighter, faster)"

  - dest:    siamese/pysot/experiments/siamrpn_r50_l234_dwxcorr/model/model.pth
    gdrive:  "1Q4-1563iPwV6wSf_lBHDj5CPFiGSlEPG"
    note:    "ResNet-50 SiamRPN (better quality, recommended)"

# ── Ultralytics YOLO models (auto-downloaded on first YOLO() call) ─────────────
# These are listed here for documentation only; setup_assets.py will warm-download them.
ultralytics:
  - filename: yolov8n.pt
    note: "General-purpose detector (fast)"
  - filename: yolov8l-seg.pt
    note: "Instance segmentation for anchor masking"
  - filename: yolov8s-seg.pt
    note: "Lighter seg model alternative"

# ── Custom / private model weights (manual download required) ─────────────────
custom_models:
  - dest:  models/yolov26nobbnew_merged_1024.pt
    note:  "Custom YOLO trained model. Contact repo owner for weights."
  - dest:  models/yolon26obb-newmerged-imgsz640-epochs75.pt
    note:  "Custom OBB YOLO model. Contact repo owner for weights."
