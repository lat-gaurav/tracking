# assets_manifest.yaml
# ---------------------
# Single source of truth for all downloadable assets.
# Run  `python setup_assets.py`  to fetch everything after cloning.
#
# Sections
# --------
#   videos        – downloaded with yt-dlp (YouTube / Pexels)
#   pysot_weights – SiamRPN model weights from Google Drive (via gdown)
#   ultralytics   – YOLO .pt files auto-downloaded by ultralytics on first use
#   custom_models – user-trained weights that must be obtained manually

